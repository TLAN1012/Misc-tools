function render(){$('stats').textContent='顯示 '+filtered.length+' / '+records.length+' 筆 · 地圖定位 '+filtered.filter(r=>Number.isFinite(r.map_lat)&&Number.isFinite(r.map_lon)).length+' 筆';$('list').innerHTML=filtered.map(r=>{const id=encodeURIComponent(idof(r)),has=Number.isFinite(r.map_lat)&&Number.isFinite(r.map_lon),phone=shown.has(idof(r))?r.phone:mask(r.phone);return '<article class="card"><div class="top"><div><div class="name">'+esc(r.name)+'</div><div class="meta">'+esc(r.student_id)+' · '+esc(r.specialty||'未標示')+'</div></div><span class="badge gray">'+esc(r.role)+'</span></div><div class="meta">'+esc(r.status||'')+'</div><div class="meta">'+esc(r.location||'未標示')+' · 電話：<span class="phoneval">'+esc(phone)+'</span></div><div class="badges">'+(has?'<span class="badge">已定位</span>':'<span class="badge gray">待定位</span>')+'</div><div class="actions"><button class="action phone" data-id="'+id+'">'+(shown.has(idof(r))?'隱藏電話':'顯示電話')+'</button><a class="action" href="'+maps(r)+'" target="_blank" rel="noopener">Google 地圖</a>'+(has?'<button class="action locate" data-id="'+id+'">在地圖顯示</button>':'')+'</div></article>'}).join('');document.querySelectorAll('.phone').forEach(b=>b.onclick=()=>{const id=decodeURIComponent(b.dataset.id);shown.has(id)?shown.delete(id):shown.add(id);render()});document.querySelectorAll('.locate').forEach(b=>b.onclick=()=>{const r=records.find(x=>idof(x)===decodeURIComponent(b.dataset.id));if(r){showMap();setTimeout(()=>{map.invalidateSize();map.setView([r.map_lat,r.map_lon],16)},80)}})}
function initMap(){map=L.map('map',{preferCanvas:true}).setView([23.7,120.9],7);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap contributors'}).addTo(map);layer=L.layerGroup().addTo(map)}
function draw(){if(!layer)return;layer.clearLayers();filtered.forEach(r=>{if(!Number.isFinite(r.map_lat)||!Number.isFinite(r.map_lon))return;L.marker([r.map_lat,r.map_lon]).bindPopup('<b>'+esc(r.name)+'</b><br>'+esc(r.specialty||'')+'<br>'+esc(r.status||'')+'<br><a href="'+maps(r)+'" target="_blank">Google 地圖</a>').addTo(layer)})}
function fit(){if(!map)return;const pts=filtered.filter(r=>Number.isFinite(r.map_lat)&&Number.isFinite(r.map_lon)).map(r=>[r.map_lat,r.map_lon]);setTimeout(()=>{map.invalidateSize();if(pts.length===1)map.setView(pts[0],15);else if(pts.length>1)map.fitBounds(pts,{padding:[22,22]})},80)}
function showMap(){document.body.classList.add('showmap');$('maptab').classList.add('active');$('listtab').classList.remove('active');setTimeout(()=>map&&map.invalidateSize(),80)}function showList(){document.body.classList.remove('showmap');$('listtab').classList.add('active');$('maptab').classList.remove('active')}
function nearby(){if(!navigator.geolocation){alert('此瀏覽器不支援定位');return}navigator.geolocation.getCurrentPosition(pos=>{const lat=pos.coords.latitude,lon=pos.coords.longitude;filtered=records.filter(r=>Number.isFinite(r.map_lat)&&Number.isFinite(r.map_lon)).map(r=>({...r,_d:Math.hypot((r.map_lat-lat)*111,(r.map_lon-lon)*102)})).sort((a,b)=>a._d-b._d).slice(0,25);render();draw();showMap();fit()},()=>alert('無法取得定位，請允許位置權限'))}
$('unlock').onclick=openApp;$('pw').addEventListener('keydown',e=>{if(e.key==='Enter')openApp()});
</script></body></html>
