<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>截圖貼合 · Misc-tools</title>
  <meta name="description" content="把連續的長截圖自動偵測重疊、無縫拼成一張長圖。" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A7%A9%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="../../assets/style.css" />
  <style>
    .layout { display: grid; grid-template-columns: 340px 1fr; gap: 22px; padding: 24px 0 60px; align-items: start; }
    @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; }
    .panel + .panel { margin-top: 16px; }
    .panel h2 { margin: 0 0 14px; font-size: 15px; letter-spacing: -.01em; }

    /* Drop zone */
    .drop { border: 2px dashed var(--border); border-radius: var(--radius-sm); padding: 26px 16px; text-align: center; cursor: pointer; transition: border-color .14s, background .14s; color: var(--text-muted); }
    .drop:hover, .drop.over { border-color: var(--accent); background: var(--accent-soft); color: var(--text); }
    .drop strong { color: var(--text); }
    .drop .big { font-size: 30px; display: block; margin-bottom: 6px; }
    .drop small { display: block; margin-top: 6px; font-size: 12px; }

    /* Thumbs */
    .thumbs { list-style: none; margin: 14px 0 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
    .thumb { display: flex; align-items: center; gap: 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 8px; }
    .thumb.dragging { opacity: .4; }
    .thumb.drop-target { border-color: var(--accent); }
    .thumb .grip { cursor: grab; color: var(--text-muted); font-size: 15px; user-select: none; padding: 0 2px; }
    .thumb img { width: 42px; height: 42px; object-fit: cover; border-radius: 6px; background: #0002; flex: none; }
    .thumb .meta { flex: 1; min-width: 0; }
    .thumb .meta .n { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .thumb .meta .d { font-size: 11px; color: var(--text-muted); }
    .thumb .ord { font-size: 12px; font-weight: 700; color: var(--accent); width: 20px; text-align: center; flex: none; }
    .thumb .x { cursor: pointer; border: none; background: none; color: var(--text-muted); font-size: 18px; line-height: 1; padding: 4px; border-radius: 6px; flex: none; }
    .thumb .x:hover { color: var(--danger); background: #0001; }

    /* Options */
    .opt { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 10px 0; font-size: 14px; }
    .opt label { color: var(--text); }
    .seg { display: inline-flex; background: var(--surface-2); border: 1px solid var(--border); border-radius: 9px; padding: 3px; }
    .seg button { appearance: none; border: none; background: none; font: inherit; font-weight: 600; font-size: 13px; color: var(--text-muted); padding: 6px 12px; border-radius: 7px; cursor: pointer; }
    .seg button.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 2px #0002; }
    input[type="number"] { width: 74px; font: inherit; padding: 6px 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); }
    input[type="color"] { width: 40px; height: 32px; padding: 0; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); cursor: pointer; }
    .hint { font-size: 12px; color: var(--text-muted); margin: 4px 0 0; }

    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 4px; }
    .actions .btn { flex: 1; justify-content: center; min-width: 120px; }

    /* Preview */
    .previewWrap { position: relative; }
    .previewInfo { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; color: var(--text-muted); font-size: 13px; }
    .previewInfo .badge { background: var(--accent-soft); color: var(--accent); font-weight: 700; padding: 3px 10px; border-radius: 999px; }
    .stage { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface-2); padding: 14px; max-height: 74vh; overflow: auto; text-align: center; }
    .stage canvas { max-width: 100%; height: auto; border-radius: 6px; box-shadow: 0 4px 18px #0003; background: #fff; }
    .empty { color: var(--text-muted); padding: 60px 20px; text-align: center; }
    .empty .big { font-size: 40px; display: block; margin-bottom: 10px; opacity: .7; }

    .toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(20px); background: var(--text); color: var(--bg); padding: 10px 18px; border-radius: 999px; font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 50; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .busy { pointer-events: none; opacity: .6; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <a class="brand" href="../../"><span class="logo">🧰</span><span>Misc-tools</span></a>
      <span class="spacer"></span>
      <a class="back" href="../../">← 回工具集合</a>
    </div>
  </header>

  <main class="wrap">
    <section class="hero" style="padding:34px 0 6px">
      <h1>🧩 截圖貼合</h1>
      <p>連續截的長截圖（例如 FB 太長的貼文），會自動偵測相鄰截圖的重疊區，無縫拼成一張長圖。全程在你的瀏覽器完成。</p>
    </section>

    <div class="layout">
      <!-- Left: controls -->
      <div>
        <div class="panel">
          <h2>1 · 加入截圖</h2>
          <div class="drop" id="drop">
            <span class="big">🖼️</span>
            <strong>點擊選擇</strong> 或拖曳圖片到這裡
            <small>可一次多張 · 依「由上到下」的順序排列</small>
          </div>
          <input type="file" id="file" accept="image/*" multiple hidden />
          <ul class="thumbs" id="thumbs"></ul>
        </div>

        <div class="panel">
          <h2>2 · 貼合方式</h2>
          <div class="opt">
            <label>模式</label>
            <div class="seg" id="mode">
              <button data-mode="auto" class="active">自動貼合</button>
              <button data-mode="stack">垂直堆疊</button>
            </div>
          </div>
          <p class="hint" id="modeHint">自動偵測相鄰截圖的重疊區並對齊，適合捲動連拍的長內容。</p>

          <div id="stackOpts" hidden>
            <div class="opt">
              <label>圖片間距</label>
              <span><input type="number" id="gap" value="0" min="0" max="200" step="2" /> px</span>
            </div>
            <div class="opt">
              <label>背景顏色</label>
              <input type="color" id="bg" value="#ffffff" />
            </div>
          </div>
        </div>

        <div class="panel">
          <h2>3 · 產生</h2>
          <div class="actions">
            <button class="btn primary" id="run" disabled>✨ 產生長圖</button>
          </div>
          <div class="actions" style="margin-top:10px">
            <button class="btn" id="download" disabled>⬇️ 下載 PNG</button>
            <button class="btn" id="copy" disabled>📋 複製</button>
          </div>
          <div class="actions" style="margin-top:10px">
            <button class="btn" id="clear" disabled>🗑️ 全部清除</button>
          </div>
        </div>
      </div>

      <!-- Right: preview -->
      <div class="panel previewWrap">
        <div class="previewInfo" id="info" hidden></div>
        <div class="stage" id="stage">
          <div class="empty" id="empty">
            <span class="big">📄</span>
            加入截圖後，這裡會顯示拼好的長圖預覽
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="wrap">圖片不會上傳，全部在本機瀏覽器處理 · <a href="../../">回工具集合</a></div>
  </footer>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
